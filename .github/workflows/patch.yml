name: Auto Patch YouTube

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new patches
        id: check_version
        run: |
          # Lấy version patches mới nhất từ ReVanced API
          LATEST_PATCHES_VER=$(curl -s https://api.revanced.app/v5/patches | jq -r '.version')
          echo "Latest ReVanced Patches version: $LATEST_PATCHES_VER"
          
          # Lấy tag release mới nhất từ repo hiện tại
          LATEST_RELEASE_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
          echo "Latest release tag: $LATEST_RELEASE_TAG"
          
          # Kiểm tra điều kiện skip (chỉ skip khi chạy tự động và tag trùng khớp)
          if [ "${{ github.event_name }}" = "schedule" ] && [[ "$LATEST_RELEASE_TAG" == *"-patches-$LATEST_PATCHES_VER" ]]; then
            echo "No new patches found. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New patches found or manual trigger. Proceeding with build."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check_version.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: steps.check_version.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Python
        if: steps.check_version.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        if: steps.check_version.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Decrypt Keystore
        if: steps.check_version.outputs.skip != 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p resources
            echo "$KEYSTORE_BASE64" | base64 -d > resources/revanced.keystore
            echo "Keystore decrypted successfully."
          else
            echo "KEYSTORE_BASE64 secret is empty. ReVanced CLI will auto-generate a keystore."
          fi

      - name: Run Patch Manager
        if: steps.check_version.outputs.skip != 'true'
        id: patch_manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/patch_manager.py

      - name: Create Release
        if: steps.check_version.outputs.skip != 'true' && steps.patch_manager.outputs.skip != 'true'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.patch_manager.outputs.release_tag }}
          name: YouTube ReVanced v${{ steps.patch_manager.outputs.yt_version }} (Patches ${{ steps.patch_manager.outputs.patches_version }})
          files: output/youtube_revanced_patched.apk
          body: |
            Automated build of YouTube ReVanced.
            - **YouTube Version:** ${{ steps.patch_manager.outputs.yt_version }}
            - **Patches Version:** ${{ steps.patch_manager.outputs.patches_version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord Notification
        if: steps.check_version.outputs.skip != 'true' && steps.patch_manager.outputs.skip != 'true' && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_TAG: ${{ steps.patch_manager.outputs.release_tag }}
          YT_VERSION: ${{ steps.patch_manager.outputs.yt_version }}
          PATCHES_VERSION: ${{ steps.patch_manager.outputs.patches_version }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"New YouTube ReVanced Build!\", \"description\": \"An automated build has completed successfully.\", \"color\": 65280, \"fields\": [{\"name\": \"YouTube Version\", \"value\": \"\`$YT_VERSION\`\", \"inline\": true}, {\"name\": \"Patches Version\", \"value\": \"\`$PATCHES_VERSION\`\", \"inline\": true}, {\"name\": \"Release Link\", \"value\": \"[Download APK here]($RELEASE_URL)\"}]}]}" \
            $DISCORD_WEBHOOK