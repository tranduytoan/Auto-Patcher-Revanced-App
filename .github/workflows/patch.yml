name: Auto Patch YouTube

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Decrypt Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p resources
            echo "$KEYSTORE_BASE64" | base64 -d > resources/revanced.keystore
            echo "Keystore decrypted successfully."
          else
            echo "KEYSTORE_BASE64 secret is empty. ReVanced CLI will auto-generate a keystore."
          fi

      - name: Run Patch Manager
        id: patch_manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/patch_manager.py

      - name: Create Release
        if: steps.patch_manager.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.patch_manager.outputs.release_tag }}
          name: YouTube ReVanced v${{ steps.patch_manager.outputs.yt_version }} (Patches ${{ steps.patch_manager.outputs.patches_version }})
          files: output/youtube_revanced_patched.apk
          body: |
            Automated build of YouTube ReVanced.
            - **YouTube Version:** ${{ steps.patch_manager.outputs.yt_version }}
            - **Patches Version:** ${{ steps.patch_manager.outputs.patches_version }}
            - **Build Date:** ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
